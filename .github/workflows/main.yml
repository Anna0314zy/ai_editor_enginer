name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Use the official registry in CI — mirrors (e.g. npmmirror → r2.cnpmjs.org) can fail with expired CDN certs.
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建项目
        run: pnpm build
        env:
          NODE_ENV: production

      - name: 部署到 GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: gh-pages
          build_dir: dist
          keep_history: true
          jekyll: false  # 如果不是 Jekyll 项目
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}